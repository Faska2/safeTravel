<div class="w-full h-full flex flex-col pt-12 pb-8 px-6 bg-white dark:bg-darkBg relative">
    <div class="flex-1 flex flex-col">
        <div class="mb-10 slide-up" style="animation-delay: 0.1s">
            <h1 class="text-3xl font-heading font-bold text-gray-900 dark:text-white mb-3">Welcome to<br><span class="text-primary">Morocco</span></h1>
            <p class="text-gray-500 dark:text-gray-400">Please select your preferred language to continue.</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-auto slide-up" style="animation-delay: 0.2s">
            <label class="relative glass-card p-4 cursor-pointer hover:border-primary transition-colors">
                <input type="radio" name="lang" value="en" class="absolute right-4 top-4 custom-radio" checked>
                <div class="text-3xl mb-3">🇬🇧</div>
                <h3 class="font-semibold text-gray-800 dark:text-gray-200">English</h3>
            </label>
            
            <label class="relative glass-card p-4 cursor-pointer hover:border-primary transition-colors">
                <input type="radio" name="lang" value="fr" class="absolute right-4 top-4 custom-radio">
                <div class="text-3xl mb-3">🇫🇷</div>
                <h3 class="font-semibold text-gray-800 dark:text-gray-200">Français</h3>
            </label>
            
            <label class="relative glass-card p-4 cursor-pointer hover:border-primary transition-colors">
                <input type="radio" name="lang" value="ar" class="absolute right-4 top-4 custom-radio">
                <div class="text-3xl mb-3">🇲🇦</div>
                <h3 class="font-semibold text-gray-800 dark:text-gray-200">العربية</h3>
            </label>
            
            <label class="relative glass-card p-4 cursor-pointer hover:border-primary transition-colors">
                <input type="radio" name="lang" value="es" class="absolute right-4 top-4 custom-radio">
                <div class="text-3xl mb-3">🇪🇸</div>
                <h3 class="font-semibold text-gray-800 dark:text-gray-200">Español</h3>
            </label>
        </div>
    </div>

    <div class="slide-up" style="animation-delay: 0.3s">
        <button id="start-btn" class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 rounded-2xl shadow-glow transition-transform active:scale-95 text-lg">
            Start Journey
        </button>
    </div>
</div>
