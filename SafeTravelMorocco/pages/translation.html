<div class="px-6 py-4 pb-10 fade-in h-full flex flex-col">
    <div class="flex items-center justify-between glass-card p-2 mb-6">
        <select class="bg-transparent border-none outline-none font-medium text-gray-700 dark:text-gray-200 px-2 py-1">
            <option>English</option>
            <option>French</option>
            <option>Spanish</option>
        </select>
        <i class="fas fa-exchange-alt text-gray-400"></i>
        <select class="bg-transparent border-none outline-none font-medium text-primary px-2 py-1">
            <option>Darija (Moroccan)</option>
            <option>Arabic</option>
        </select>
    </div>

    <div class="glass-card p-4 mb-4 relative min-h-[150px] shadow-sm">
        <textarea class="w-full bg-transparent border-none outline-none resize-none text-xl text-gray-800 dark:text-gray-200 placeholder-gray-400" rows="3" placeholder="Type something to translate..."></textarea>
        <div class="absolute bottom-4 right-4 flex gap-3">
            <button class="w-10 h-10 rounded-full bg-gray-100 dark:bg-darkBg text-gray-500 hover:text-primary transition-colors">
                <i class="fas fa-times"></i>
            </button>
            <button class="w-10 h-10 rounded-full bg-primary text-white shadow-glow hover:bg-primary/90 transition-colors" onclick="document.getElementById('trans-result').classList.remove('hidden')">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- Output Card -->
    <div id="trans-result" class="hidden glass-card p-5 bg-gradient-to-br from-primary/5 to-transparent border-primary/20 slide-up relative">
        <p class="text-2xl font-heading font-medium text-gray-900 dark:text-white mb-2" dir="rtl">شحال الثمن ديال هذا؟</p>
        <p class="text-sm text-gray-500">Chhal taman dyal hada?</p>
        
        <div class="absolute bottom-4 left-4">
            <button class="text-primary hover:text-primary/80 transition-colors flex items-center gap-2">
                <i class="fas fa-volume-up"></i> <span class="text-xs font-semibold">Listen</span>
            </button>
        </div>
        <div class="absolute bottom-4 right-4 flex gap-2">
            <button class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"><i class="far fa-copy"></i></button>
            <button class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"><i class="far fa-star"></i></button>
        </div>
    </div>

    <!-- Microphone -->
    <div class="mt-auto mb-8 flex justify-center">
        <button class="relative w-20 h-20 bg-primary rounded-full text-white text-3xl shadow-glow hover:scale-105 active:scale-95 transition-all flex items-center justify-center group" onclick="this.querySelector('.pulse-ring').classList.toggle('hidden')">
            <i class="fas fa-microphone z-10"></i>
            <div class="pulse-ring hidden absolute inset-0 rounded-full border-4 border-primary animate-ping"></div>
        </button>
    </div>
</div>
