<div class="h-full flex flex-col fade-in">
    <!-- Camera Viewport Mock -->
    <div class="relative w-full h-[60vh] bg-black overflow-hidden" id="scanner-ui">
        <img src="https://images.unsplash.com/photo-1539020140153-e479b8c22e70?w=800&h=1200&fit=crop" class="w-full h-full object-cover opacity-60">
        
        <!-- Scanner Overlay -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="w-64 h-64 border-2 border-white/50 rounded-2xl relative">
                <!-- Corners -->
                <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-xl"></div>
                <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-xl"></div>
                <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-xl"></div>
                <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-xl"></div>
                
                <!-- Scan Line -->
                <div class="scan-line"></div>
            </div>
        </div>

        <div class="absolute top-6 w-full flex justify-center">
            <div class="bg-black/50 backdrop-blur-md text-white px-4 py-2 rounded-full text-sm flex items-center gap-2">
                <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div> Point at monument or menu
            </div>
        </div>

        <div class="absolute bottom-8 w-full flex justify-center gap-6">
            <button class="w-14 h-14 rounded-full bg-white/20 backdrop-blur-md text-white flex items-center justify-center text-xl hover:bg-white/30 transition">
                <i class="fas fa-image"></i>
            </button>
            <button id="scan-btn" class="w-20 h-20 rounded-full border-4 border-primary bg-white/20 backdrop-blur flex items-center justify-center active:scale-95 transition-transform">
                <div class="w-14 h-14 bg-primary rounded-full shadow-glow"></div>
            </button>
            <button class="w-14 h-14 rounded-full bg-white/20 backdrop-blur-md text-white flex items-center justify-center text-xl hover:bg-white/30 transition">
                <i class="fas fa-bolt"></i>
            </button>
        </div>
    </div>

    <!-- Result Card (Hidden Initially) -->
    <div id="scan-result" class="hidden absolute inset-0 bg-white dark:bg-darkBg z-20 flex flex-col slide-up">
        <div class="relative h-64">
            <img src="https://images.unsplash.com/photo-1539020140153-e479b8c22e70?w=800&h=600&fit=crop" class="w-full h-full object-cover">
            <button class="absolute top-4 left-4 w-10 h-10 bg-black/50 backdrop-blur rounded-full text-white flex items-center justify-center" onclick="document.getElementById('scan-result').classList.add('hidden'); document.getElementById('scanner-ui').classList.remove('hidden');">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="flex-1 p-6 bg-white dark:bg-darkBg -mt-6 rounded-t-3xl relative">
            <div class="absolute -top-12 right-6 w-16 h-16 bg-white dark:bg-darkCard rounded-full shadow-lg flex items-center justify-center">
                <i class="fas fa-check-circle text-primary text-3xl"></i>
            </div>
            
            <span class="text-xs font-semibold text-primary uppercase tracking-wider bg-primary/10 px-3 py-1 rounded-full mb-3 inline-block">AI Match 98%</span>
            <h2 class="text-2xl font-heading font-bold text-gray-900 dark:text-white mb-2">Koutoubia Mosque</h2>
            <p class="text-sm text-gray-500 mb-6"><i class="fas fa-map-marker-alt"></i> Marrakech, Morocco</p>

            <h3 class="font-semibold mb-2 text-gray-800 dark:text-gray-200">History</h3>
            <p class="text-sm text-gray-600 dark:text-gray-400 mb-6 leading-relaxed">
                The Koutoubia Mosque or Kutubiyya Mosque is the largest mosque in Marrakech, Morocco. It was completed under the reign of the Almohad Caliph Yaqub al-Mansur (1184–1199).
            </p>

            <button class="w-full bg-gray-100 dark:bg-darkCard text-gray-800 dark:text-white font-semibold py-4 rounded-xl shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2">
                <i class="fas fa-headphones"></i> Play Audio Guide
            </button>
        </div>
    </div>
</div>
