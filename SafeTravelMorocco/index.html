<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>SafeTravel Morocco</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#38BC97',
                        secondary: '#D4EBE2',
                        accent: '#F5F5F0',
                        darkBg: '#121212',
                        darkCard: '#1E1E1E'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif']
                    },
                    boxShadow: {
                        'soft': '0 4px 20px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(56, 188, 151, 0.5)'
                    }
                }
            }
        }
    </script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body class="bg-gray-50 dark:bg-darkBg text-gray-800 dark:text-gray-200 font-sans antialiased overflow-hidden selection:bg-primary selection:text-white transition-colors duration-300">
    
    <!-- App Container (Mobile Sized for Preview) -->
    <div id="app-container" class="relative w-full h-screen max-w-md mx-auto bg-white dark:bg-darkBg shadow-2xl overflow-hidden flex flex-col">
        
        <!-- Header (Dynamic) -->
        <header id="app-header" class="hidden px-6 py-4 flex justify-between items-center bg-white/80 dark:bg-darkBg/80 backdrop-blur-md z-40 sticky top-0 transition-all duration-300">
            <button id="back-btn" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 dark:bg-darkCard text-gray-600 dark:text-gray-300 active:scale-95 transition">
                <i class="fas fa-chevron-left"></i>
            </button>
            <h1 id="header-title" class="font-heading font-semibold text-lg">Title</h1>
            <div class="w-10 h-10"></div> <!-- Placeholder for balance -->
        </header>

        <!-- Main Content Area -->
        <main id="app-content" class="flex-1 overflow-y-auto overflow-x-hidden relative scroll-smooth pb-32"></main>

        <!-- Bottom Navigation (Floating) -->
        <nav id="bottom-nav" class="hidden absolute bottom-6 left-4 right-4 bg-white/95 dark:bg-darkCard/95 backdrop-blur-xl border border-gray-100 dark:border-gray-800 px-6 py-3 flex justify-between items-center z-50 rounded-3xl shadow-2xl transition-transform duration-300">
            <button class="nav-item active flex flex-col items-center gap-1 text-primary transition-colors" data-target="home">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[10px] font-medium">Home</span>
            </button>
            <button class="nav-item flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors" data-target="planner">
                <i class="fas fa-wallet text-xl"></i>
                <span class="text-[10px] font-medium">Budget</span>
            </button>
            <div class="relative -top-6">
                <button class="nav-item flex items-center justify-center w-14 h-14 bg-gradient-to-tr from-primary to-emerald-400 rounded-full text-white shadow-glow hover:scale-105 active:scale-95 transition-all" data-target="scanner">
                    <i class="fas fa-qrcode text-2xl"></i>
                </button>
            </div>
            <button class="nav-item flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors" data-target="notifications">
                <div class="relative">
                    <i class="fas fa-bell text-xl"></i>
                    <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white dark:border-darkCard"></span>
                </div>
                <span class="text-[10px] font-medium">Alerts</span>
            </button>
            <button class="nav-item flex flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors" data-target="profile">
                <i class="fas fa-user text-xl"></i>
                <span class="text-[10px] font-medium">Profile</span>
            </button>
        </nav>
    </div>

    <!-- Modals Container -->
    <div id="modal-container"></div>

    <script src="js/app.js?v=3" type="module"></script>
</body>
</html>
